<app-cabecera></app-cabecera>

<main class="min-h-screen bg-slate-50 pt-24 pb-10">
  <div class="mx-auto w-full max-w-screen-xl px-4">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">
          {{ isEditMode ? 'Editar rol' : 'Crear rol' }}
        </h1>
        <p class="text-sm text-slate-500">Define los permisos que tendrá este rol dentro del sistema.</p>
      </div>

      <div class="flex items-center gap-2">
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-full
                 bg-gray-200 hover:bg-gray-300 text-gray-800
                 text-sm font-semibold px-6 py-2.5 shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
          (click)="onRegresar()"
          [disabled]="loading || saving"
        >
          Regresar
        </button>

        <button
          type="button"
          class="shrink-0 inline-flex items-center gap-2
                 text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700
                 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300
                 font-semibold rounded-full text-sm px-6 py-2.5
                 text-center leading-5 shadow transition active:scale-[0.98]
                 disabled:opacity-60 disabled:cursor-not-allowed"
          (click)="onGuardar()"
          [disabled]="loading || saving"
        >
          {{ saving ? 'Guardando...' : 'Guardar rol' }}
        </button>
      </div>
    </div>

    <div *ngIf="loading" class="mb-4 rounded-2xl border border-blue-200 bg-blue-50 px-4 py-3 text-sm text-blue-700">
      Cargando información del rol...
    </div>

    <div *ngIf="errorMessage" class="mb-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
      {{ errorMessage }}
    </div>

    <div class="rounded-2xl border border-gray-200 bg-white shadow-sm p-5">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-4">

        <div class="md:col-span-5">
          <label class="block text-sm font-semibold text-gray-900 mb-1">
            Nombre del rol <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            class="block w-full p-3 bg-white border border-gray-300
                   text-gray-900 text-sm rounded-full
                   focus:ring-blue-500 focus:border-blue-500 shadow-sm
                   placeholder:text-gray-400"
            placeholder="Ej. Gerencia"
            [(ngModel)]="form.nombre"
            name="nombre"
            [disabled]="loading || saving"
          />
          <p *ngIf="submitted && !form.nombre?.trim()" class="mt-1 text-xs text-red-600">
            El nombre del rol es obligatorio.
          </p>
        </div>

        <div class="md:col-span-5">
          <label class="block text-sm font-semibold text-gray-900 mb-1">
            Descripción
          </label>
          <input
            type="text"
            class="block w-full p-3 bg-white border border-gray-300
                   text-gray-900 text-sm rounded-full
                   focus:ring-blue-500 focus:border-blue-500 shadow-sm
                   placeholder:text-gray-400"
            placeholder="Ej. Consulta información y solicita mantenimientos"
            [(ngModel)]="form.descripcion"
            name="descripcion"
            [disabled]="loading || saving"
          />
        </div>

        <div class="md:col-span-2 flex md:justify-end md:items-end">
          <label class="inline-flex items-center cursor-pointer gap-3 select-none">
            <input
              type="checkbox"
              class="sr-only peer"
              [(ngModel)]="form.activo"
              name="activo"
              [disabled]="loading || saving || isSystemAdminRole"
            />
            <div
              class="relative w-11 h-6 bg-gray-200 rounded-full peer
                     peer-focus:ring-4 peer-focus:ring-blue-300
                     peer-checked:bg-emerald-500 transition"
            >
              <div
                class="absolute top-[2px] left-[2px] bg-white border border-gray-200 rounded-full h-5 w-5 transition
                       peer-checked:translate-x-5"
              ></div>
            </div>
            <span class="text-sm font-semibold" [ngClass]="form.activo ? 'text-emerald-700' : 'text-gray-700'">
              {{ form.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </label>
        </div>

      </div>
    </div>

    <div class="mt-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold text-slate-900">Permisos</h2>
        <div class="text-sm text-slate-500">
          Seleccionados: <span class="font-semibold text-slate-900">{{ selectedCount }}</span>
        </div>
      </div>

      <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
        <div
          *ngFor="let mod of modulos"
          class="rounded-2xl border border-gray-200 bg-white shadow-sm p-5"
        >
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-semibold text-gray-900">{{ mod.titulo }}</h3>
              <p class="text-xs text-gray-500 mt-0.5">{{ mod.descripcion }}</p>
            </div>

            <div class="flex items-center gap-2">
              <button
                type="button"
                class="text-xs font-semibold rounded-full px-3 py-1.5
                       bg-slate-100 hover:bg-slate-200 text-slate-700 disabled:opacity-60 disabled:cursor-not-allowed"
                (click)="selectAll(mod.key)"
                [disabled]="loading || saving"
              >
                Todo
              </button>
              <button
                type="button"
                class="text-xs font-semibold rounded-full px-3 py-1.5
                       bg-slate-100 hover:bg-slate-200 text-slate-700 disabled:opacity-60 disabled:cursor-not-allowed"
                (click)="clearAll(mod.key)"
                [disabled]="loading || saving"
              >
                Nada
              </button>
            </div>
          </div>

          <div class="mt-4 space-y-3">
            <label
              *ngFor="let p of mod.permisos"
              class="flex items-center gap-3 cursor-pointer select-none"
            >
              <input
                type="checkbox"
                class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded
                       focus:ring-blue-500 focus:ring-2"
                [checked]="hasPermiso(p.code)"
                (change)="togglePermiso(p.code)"
                [disabled]="loading || saving"
              />
              <div>
                <p class="text-sm font-semibold text-gray-900">{{ p.label }}</p>
                <p class="text-xs text-gray-500">{{ p.help }}</p>
              </div>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-2">
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-full
               bg-gray-200 hover:bg-gray-300 text-gray-800
               text-sm font-semibold px-6 py-2.5 shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
        (click)="onRegresar()"
        [disabled]="loading || saving"
      >
        Cancelar
      </button>

      <button
        type="button"
        class="shrink-0 inline-flex items-center gap-2
               text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700
               hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300
               font-semibold rounded-full text-sm px-6 py-2.5
               text-center leading-5 shadow transition active:scale-[0.98]
               disabled:opacity-60 disabled:cursor-not-allowed"
        (click)="onGuardar()"
        [disabled]="loading || saving"
      >
        {{ saving ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>
  </div>
</main>

<app-footer></app-footer>
