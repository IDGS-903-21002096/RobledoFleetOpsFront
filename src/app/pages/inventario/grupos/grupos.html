<app-cabecera></app-cabecera>

<main class="min-h-screen bg-slate-50 pt-24 pb-10">
  <div class="mx-auto w-full max-w-screen-xl px-4">

    <!-- Header -->
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Almacén</h1>
        <p class="text-sm text-slate-500">Grupos de artículos</p>
      </div>

      <button
        type="button"
        class="shrink-0 inline-flex items-center gap-2
               text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700
               hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300
               font-semibold rounded-full text-sm px-5 py-2.5
               text-center leading-5 shadow transition active:scale-[0.98]"
        (click)="onAgregarGrupo()"
      >
        <span class="text-base leading-none">+</span>
        Agregar Grupo
      </button>
    </div>

    <!-- Tabla -->
    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="border-b border-slate-100 bg-slate-50 px-6 py-4">
        <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wide">Grupos registrados</h2>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm text-slate-600">
          <thead class="bg-white text-xs uppercase text-slate-500">
            <tr class="border-b border-slate-100">
              <th class="px-6 py-4 w-28">ID</th>
              <th class="px-6 py-4">Nombre</th>
              <th class="px-6 py-4 text-right w-64">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr
              *ngFor="let g of grupos"
              class="border-b border-slate-100 hover:bg-slate-50/60"
            >
              <td class="px-6 py-4 font-semibold text-slate-900">{{ g.id }}</td>
              <td class="px-6 py-4 font-semibold text-slate-900">{{ g.nombre }}</td>

              <td class="px-6 py-4">
                <div class="flex justify-end gap-2">
                  <button
                    type="button"
                    class="rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-700
                           hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100"
                    (click)="onActualizar(g)"
                  >
                    Actualizar
                  </button>

                  <button
                    type="button"
                    class="rounded-full border border-rose-200 bg-rose-50 px-4 py-2 text-xs font-semibold text-rose-700
                           hover:bg-rose-100 focus:outline-none focus:ring-4 focus:ring-rose-100"
                    (click)="onEliminar(g)"
                  >
                    Eliminar
                  </button>
                </div>
              </td>
            </tr>

            <tr *ngIf="grupos.length === 0">
              <td colspan="3" class="px-6 py-10 text-center text-slate-500">
                No hay grupos registrados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<app-footer></app-footer>
