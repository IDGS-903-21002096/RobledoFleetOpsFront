<app-cabecera></app-cabecera>

<main class="min-h-screen bg-slate-50 pt-24 pb-10">
  <div class="mx-auto w-full max-w-screen-xl px-4">

    <div class="mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">
          {{ editId !== null ? 'Actualizar grupo' : 'Agregar grupo' }}
        </h1>
        <p class="text-sm text-slate-500">Solo se captura el nombre del grupo.</p>
      </div>

      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700
               hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100
               disabled:opacity-60 disabled:cursor-not-allowed"
        (click)="onCancelar()"
        [disabled]="saving"
      >
        ← Regresar
      </button>
    </div>

    <div
      *ngIf="errorMessage"
      class="mb-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"
    >
      {{ errorMessage }}
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="border-b border-slate-100 px-6 py-4">
        <h2 class="text-base font-semibold text-slate-900">Datos</h2>
      </div>

      <div *ngIf="loading" class="px-6 py-10 text-center text-sm text-slate-500">
        Cargando información del grupo...
      </div>

      <div *ngIf="!loading" class="px-6 py-6">
        <label class="mb-1 block text-sm font-semibold text-slate-700" for="nombre">
          Nombre <span class="text-rose-600">*</span>
        </label>

        <input
          id="nombre"
          type="text"
          [(ngModel)]="nombre"
          (blur)="touchedNombre = true"
          placeholder="Ej: HERRAMIENTA"
          class="block w-full max-w-xl rounded-full border px-4 py-2.5 text-sm shadow-sm outline-none transition focus:ring-4"
          [ngClass]="{
            'border-slate-200 focus:border-blue-500 focus:ring-blue-100': !touchedNombre || nombreValido,
            'border-rose-300 focus:border-rose-500 focus:ring-rose-100': touchedNombre && !nombreValido
          }"
        />

        <p *ngIf="touchedNombre && !nombreValido" class="mt-1 text-xs text-rose-600">
          Escribe un nombre válido (mínimo 3 caracteres).
        </p>

        <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700
                   hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100
                   disabled:opacity-60 disabled:cursor-not-allowed"
            (click)="onCancelar()"
            [disabled]="saving"
          >
            Cancelar
          </button>

          <button
            type="button"
            class="inline-flex items-center justify-center rounded-full px-6 py-2.5 text-sm font-semibold text-white shadow
                   bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br
                   focus:outline-none focus:ring-4 focus:ring-blue-300
                   disabled:opacity-60 disabled:cursor-not-allowed"
            [disabled]="!nombreValido || saving"
            (click)="onGuardar()"
          >
            {{
              saving
                ? (editId !== null ? 'Actualizando...' : 'Guardando...')
                : (editId !== null ? 'Actualizar' : 'Guardar')
            }}
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<app-footer></app-footer>
