<nav class="bg-[#0B3A78] fixed w-full z-20 top-0 start-0 border-b border-white/10 shadow-md">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

    <!-- Logo -->
    <a routerLink="/inicio" class="flex items-center space-x-3 rtl:space-x-reverse">
      <!-- Fondo blanco para que el logo no se pierda -->
      <div class="bg-white rounded-full p-2 shadow-sm">
        <img src="img/robledoco.png" class="h-7 w-7 object-contain" alt="Robledo & Co" />
      </div>

      <span class="self-center text-xl text-white font-semibold whitespace-nowrap">
        Robledo FleetOps
      </span>
    </a>

    <!-- Right actions -->
    <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">

      <!-- Avatar button (Angular toggle) -->
      <button type="button"
        class="flex text-sm bg-white/10 hover:bg-white/20 transition rounded-full md:me-0 focus:ring-4 focus:ring-white/30"
        [attr.aria-expanded]="userMenuOpen" (click)="$event.stopPropagation(); toggleUserMenu()">
        <span class="sr-only">Open user menu</span>
        <img class="w-8 h-8 rounded-full border border-white/30"
          src="https://flowbite.com/docs/images/people/profile-picture-5.jpg" alt="user photo" />
      </button>

      <!-- Dropdown (Angular) -->
      <div
        class="z-50 bg-white border border-gray-200 rounded-xl shadow-lg w-56 absolute right-4 top-[68px] md:top-[72px]"
        [class.hidden]="!userMenuOpen" (click)="$event.stopPropagation()">
        <div class="px-4 py-3 text-sm border-b border-gray-200">
          <span class="block text-gray-900 font-medium">Usuario</span>
          <span class="block text-gray-500 truncate">usuario@robledo.com</span>
        </div>

        <ul class="p-2 text-sm text-gray-700 font-medium">
          <li>
            <a routerLink="/usuarios" class="inline-flex items-center w-full p-2 hover:bg-gray-100 rounded-lg"
              (click)="closeUserMenu()">
              Usuarios
            </a>
          </li>

          <li class="border-t border-gray-200 mt-2 pt-2">
            <a routerLink="/" class="inline-flex items-center w-full p-2 hover:bg-gray-100 rounded-lg text-red-600"
              (click)="closeUserMenu()">
              Cerrar sesión
            </a>
          </li>
        </ul>
      </div>

      <!-- Mobile menu button (Angular toggle) -->
      <button type="button"
        class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-white rounded-lg md:hidden hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/30"
        aria-controls="navbar-user" [attr.aria-expanded]="mobileMenuOpen" (click)="toggleMobileMenu()">
        <span class="sr-only">Open main menu</span>
        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
          viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
        </svg>
      </button>
    </div>

    <!-- Links -->
    <div id="navbar-user" class="items-center justify-between w-full md:flex md:w-auto md:order-1"
      [class.hidden]="!mobileMenuOpen">
      <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 rounded-xl bg-white/10 border border-white/10
               md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-transparent">
        <li>
          <a routerLink="/inicio" routerLinkActive="md:text-white md:underline md:underline-offset-8"
            [routerLinkActiveOptions]="{ exact: true }"
            class="block py-2 px-3 text-white rounded md:p-0 hover:text-blue-200 transition"
            (click)="closeMobileMenu()">
            Inicio
          </a>
        </li>

        <li class="relative">

          <!-- Desktop: dropdown hover (SIN parpadeo) -->
          <div class="hidden md:block relative group">
            <button type="button" class="inline-flex items-center gap-2 py-2 px-3 md:p-0
             text-white/90 hover:text-blue-200 transition font-medium">
              Vehículos
              <svg class="w-4 h-4 opacity-90" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z"
                  clip-rule="evenodd" />
              </svg>
            </button>

            <!-- Contenedor dropdown (puente con pt-2) -->
            <div class="absolute left-0 top-full pt-2 z-50
             opacity-0 invisible translate-y-1
             group-hover:opacity-100 group-hover:visible group-hover:translate-y-0
             group-focus-within:opacity-100 group-focus-within:visible group-focus-within:translate-y-0
             transition duration-150">
              <div class="w-56 rounded-xl border border-gray-200 bg-white shadow-lg overflow-hidden">
                <a routerLink="/vehiculos" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition">
                  Consultar
                </a>

                <a routerLink="/vehiculos/tipos"
                  class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition">
                  Tipos de vehículo
                </a>
              </div>
            </div>
          </div>

          <!-- Mobile: link normal -->
          <a routerLink="/vehiculos" routerLinkActive="md:text-white md:underline md:underline-offset-8"
            class="md:hidden block py-2 px-3 text-white/90 rounded hover:text-blue-200 transition"
            (click)="closeMobileMenu()">
            Vehículos
          </a>

        </li>

        <li class="relative">

          <!-- Desktop: dropdown hover (SIN parpadeo) -->
          <div class="hidden md:block relative group">
            <button type="button" class="inline-flex items-center gap-2 py-2 px-3 md:p-0
     text-white/90 hover:text-blue-200 transition font-medium">
              Inventario
              <svg class="w-4 h-4 opacity-90" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z"
                  clip-rule="evenodd" />
              </svg>
            </button>

            <!-- Contenedor dropdown (puente con pt-2) -->
            <div class="absolute left-0 top-full pt-2 z-50
     opacity-0 invisible translate-y-1
     group-hover:opacity-100 group-hover:visible group-hover:translate-y-0
     group-focus-within:opacity-100 group-focus-within:visible group-focus-within:translate-y-0
     transition duration-150">
              <div class="w-56 rounded-xl border border-gray-200 bg-white shadow-lg overflow-hidden">

                <a routerLink="/inventario" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition">
                  Consultar
                </a>

                <a routerLink="/inventario/grupos"
                  class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition">
                  Grupos de artículos
                </a>

              </div>
            </div>
          </div>

          <!-- Mobile: link normal -->
          <a routerLink="/inventario" routerLinkActive="md:text-white md:underline md:underline-offset-8"
            class="md:hidden block py-2 px-3 text-white/90 rounded hover:text-blue-200 transition"
            (click)="closeMobileMenu()">
            Inventario
          </a>

        </li>

        <li>
          <a routerLink="/mantenimientos" routerLinkActive="md:text-white md:underline md:underline-offset-8"
            class="block py-2 px-3 text-white/90 rounded hover:text-blue-200 transition md:p-0"
            (click)="closeMobileMenu()">
            Mantenimientos
          </a>
        </li>

        <li>
          <a routerLink="/proveedores" routerLinkActive="md:text-white md:underline md:underline-offset-8"
            class="block py-2 px-3 text-white/90 rounded hover:text-blue-200 transition md:p-0"
            (click)="closeMobileMenu()">
            Proveedores
          </a>
        </li>

        <li class="relative">

          <!-- Desktop: dropdown con hover (SIN parpadeo) -->
          <div class="hidden md:block relative group">
            <button type="button" class="inline-flex items-center gap-2 py-2 px-3 md:p-0
           text-white/90 hover:text-blue-200 transition font-medium">
              Usuarios
              <svg class="w-4 h-4 opacity-90" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z"
                  clip-rule="evenodd" />
              </svg>
            </button>

            <!-- Contenedor del dropdown: top-full + pt-2 hace de "puente" -->
            <div class="absolute left-0 top-full pt-2 z-50
           opacity-0 invisible translate-y-1
           group-hover:opacity-100 group-hover:visible group-hover:translate-y-0
           group-focus-within:opacity-100 group-focus-within:visible group-focus-within:translate-y-0
           transition duration-150">
              <!-- Menú -->
              <div class="w-56 rounded-xl border border-gray-200 bg-white shadow-lg overflow-hidden">
                <a routerLink="/usuarios" class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition">
                  Consultar
                </a>

                <a routerLink="/usuarios/roles"
                  class="block px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 transition">
                  Roles y facultades
                </a>
              </div>
            </div>
          </div>

          <!-- Mobile: link normal -->
          <a routerLink="/usuarios" routerLinkActive="md:text-white md:underline md:underline-offset-8"
            class="md:hidden block py-2 px-3 text-white/90 rounded hover:text-blue-200 transition"
            (click)="closeMobileMenu()">
            Usuarios
          </a>

        </li>
      </ul>
    </div>

  </div>
</nav>
